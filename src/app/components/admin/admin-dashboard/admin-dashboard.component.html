<div class="container-fluid py-3 admin-dashboard">

  <!-- HEADER -->
  <div class="d-flex justify-content-center mb-4">
    <h4 class="fw-semibold dashboard-title">
      Admin Dashboard
    </h4>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="row g-3 mb-4">

    <!-- USERS CARD -->
    <div class="col-md-6">
      <div class="card border-0 shadow-sm h-100 action-card p-3" (click)="listUsers()">
        <div class="d-flex align-items-center justify-content-between">

          <div>
            <div class="text-muted small">Manage</div>
            <div class="fw-semibold fs-5">Users</div>

            <!-- COUNT -->
            <div class="user-count mt-1">
              {{ userCount || 0 }} Users
            </div>

            <!-- NOTE -->
            <div class="card-note">
              Click here to view user list →
            </div>
          </div>

          <div class="card-icon bg-primary">
            <i class="bi bi-people-fill"></i>
          </div>

        </div>
      </div>
    </div>

    <!-- GRAFANA -->
    <div class="col-md-6">
      <div class="card border-0 shadow-sm h-100 action-card p-3" (click)="grafanaReports()">
        <div class="d-flex align-items-center justify-content-between">

          <div>
            <div class="text-muted small">Analytics</div>
            <div class="fw-semibold fs-5">Grafana Reports</div>

            <div class="card-note">
              Click here to go to Grafana →
            </div>
          </div>

          <div class="card-icon bg-dark">
            <i class="bi bi-bar-chart-fill"></i>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- ACTION BUTTONS -->
  <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">

    <button
      class="btn btn-outline-dark px-4 py-2 rounded-pill d-flex align-items-center gap-2 shadow-sm btn-hover-icon overflow-hidden"
      (click)="viewVisits()"
    >
      <i class="bi bi-geo-alt"></i>
      <span>Visits</span>
    </button>

    <div class="dropdown">
      <button
        class="btn btn-dark dropdown-toggle px-4 py-2 rounded-pill shadow-sm d-flex align-items-center gap-2 btn-hover-icon"
        data-bs-toggle="dropdown"
      >
        <i class="bi bi-receipt"></i>
        <span>Expense</span>
      </button>

      <ul class="dropdown-menu shadow border-0 rounded-3">
        <li>
          <button class="dropdown-item" (click)="handleRouting(1)">
            ➕ Add Expense
          </button>
        </li>
        <li>
          <button class="dropdown-item" (click)="handleRouting(2)">
            ⚙️ Review Expense
          </button>
        </li>
      </ul>
    </div>

  </div>

  <!-- PENDING TABLE -->
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h5 class="mb-3 fw-semibold text-dark">Pending Expenses</h5>
      <app-pending-expense-table></app-pending-expense-table>
    </div>
  </div>

</div>
