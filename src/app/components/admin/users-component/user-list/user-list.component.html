<div class="container-fluid py-3">

  <!-- HEADER -->
  <div class="d-flex align-items-center justify-content-between position-relative mb-4">
    
    <app-back-button></app-back-button>

    <h4 class="mb-0 position-absolute top-50 start-50 translate-middle fw-semibold">
      Users List
    </h4>

  </div>

  <!-- FILTER -->
  <div class="d-flex justify-content-center mb-4">
    <input
      type="month"
      class="form-control w-auto shadow-sm"
      [(ngModel)]="date"
      (change)="dateOnChange($event)"
      [max]="maxMonth"
    />
  </div>

  <!-- LIST CARD -->
  <div class="card border-0 shadow-sm mx-auto user-container">

    <div class="card-body">

      <!-- SELECT ALL -->
      <div class="form-check text-center mb-3">
        <input
          type="checkbox"
          class="form-check-input"
          [checked]="isAllSelected()"
          (change)="toggleSelectAll($event)"
          id="selectAll"
        />
        <label class="form-check-label fw-medium" for="selectAll">
          Select All
        </label>
      </div>

      <!-- USER LIST -->
      <div class="d-flex flex-column gap-2">

        <div
          class="user-card d-flex align-items-center gap-3"
          *ngFor="let user of users"
        >
          <input
            type="checkbox"
            class="form-check-input"
            [checked]="isSelected(user.id)"
            (change)="toggleUser(user, $event)"
          />

          <img src="expn.png" class="user-avatar" />

          <div class="flex-grow-1">
            <div class="user-name">{{ user.name }}</div>
            <div class="user-expense">₹ {{ user.expense }}</div>
          </div>

        </div>

      </div>

      <!-- ACTION BUTTONS -->
      <div class="d-flex justify-content-center gap-3 mt-4">

        <button
          class="btn btn-dark px-4 rounded-pill shadow-sm"
          (click)="viewExpenses()"
          [disabled]="selectedUsers.length === 0"
        >
          View Expenses
        </button>

        <button
          class="btn btn-outline-secondary px-4 rounded-pill"
          (click)="clearSelection()"
        >
          Clear
        </button>

      </div>

    </div>
  </div>
</div>
