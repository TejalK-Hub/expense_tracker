<div class="container">

  <div class="container p-3 d-flex align-items-center justify-content-between position-relative">

    <div>
      <app-back-button></app-back-button>
    </div>

    <h2 class="mb-0 position-absolute start-50 translate-middle-x">
      Users List
    </h2>

  </div>

  <div class="d-flex justify-content-center my-4 p-component-overlay-container">
    <input
      type="month"
      class="form-control w-auto"
      [(ngModel)]="date"
      (change)="dateOnChange($event)"
      [max]="maxMonth"
    />
  </div>

  <div class="d-flex justify-content-center">

    <ol class="list-group user-list">

      <li
        class="list-group-item user-card d-flex align-items-center gap-3"
        *ngFor="let user of users"
        (click)="openUserExpenses()"
      >

        <img src="expn.png" class="user-avatar" alt="expense image" />

        <div class="d-flex flex-column">
          <span class="user-name">{{ user.name }}</span>
          <span class="user-expense">Total: ₹{{ user.expense }}</span>
        </div>

      </li>

    </ol>

  </div>

</div>
