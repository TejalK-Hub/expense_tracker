<div class="container mt-4">

  <!-- SUCCESS POPUP -->
  <div *ngIf="showPopup" class="custom-popup">
    Your Visit Has Been Added Successfully!
  </div>

  <!-- HEADER -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <!-- <app-back-button></app-back-button> -->
    <!-- <h3 class="title mb-0">Add Visit</h3> -->
    <div style="width: 40px;"></div>
  </div>

  <!-- FORM CARD -->
  <div class="form-card">
    <form [formGroup]="visitForm">

      <!-- GRID START -->
      <div class="row g-3">

        <!-- Start Date -->
        <div class="col-md-6">
          <label class="form-label">
            Start Date <span class="required">*</span>
          </label>
          <input
            type="date"
            class="form-control"
            formControlName="start_date"
          />
        </div>

        <!-- End Date -->
        <div class="col-md-6">
          <label class="form-label">End Date</label>
          <input
            type="date"
            class="form-control"
            formControlName="end_date"
            [min]="visitForm.get('start_date')?.value"
          />

          <div
            *ngIf="visitForm.errors?.['invalidDate'] && visitForm.touched"
            class="text-danger small mt-1"
          >
            End date cannot be before start date
          </div>
        </div>

        <!-- Client -->
        <div class="col-md-6">
          <label class="form-label">
            Client <span class="required">*</span>
          </label>
          <select class="form-select" formControlName="client_id">
            <option value="" disabled>Select Client</option>
            <option *ngFor="let client of clients" [value]="client.id">
              {{ client.name }}
            </option>
          </select>
        </div>

        <!-- Visit Reason -->
        <div class="col-md-6">
          <label class="form-label">
            Visit Reason <span class="required">*</span>
          </label>
          <select class="form-select" formControlName="visit_reason_id">
            <option value="" disabled>Select Visit Reason</option>
            <option
              *ngFor="let visitReason of visitReasons"
              [value]="visitReason.id"
            >
              {{ visitReason.name }}
            </option>
          </select>
        </div>

        <!-- Agenda (Full Width like description) -->
        <div class="col-12">
          <label class="form-label">Agenda</label>
          <textarea 
            class="form-control text-area"
            formControlName="agenda"
          ></textarea>
        </div>

      </div>
      <!-- GRID END -->

      <!-- BUTTONS -->
      <div class="mt-4 d-flex gap-2">
        <button
          type="button"
          class="btn btn-primary w-100"
          (click)="onSubmit()"
        >
          Save
        </button>

        <button
          type="button"
          class="btn btn-light w-100"
          (click)="clearFields()"
        >
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
