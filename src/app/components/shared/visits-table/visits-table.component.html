<div class="container">
<div class="d-flex justify-content-center p-5">
  <h2 class="mb-0">Past Visits</h2>
</div>  
<table class="table clean-table visits-table">
  <thead class="clean-head">
    <tr>
      <th scope="col">Sr.</th>
      <th scope="col">VisitsId</th>
      <th scope="col">StartDate</th>
      <th scope="col">EndDate</th>
      <th scope="col">CreatedAt</th>
      <th scope="col">CliendId</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let visit of visits; let i = index" class="clean-row">

      <th scope="row">{{ i + 1 }}</th>

      <td>{{ visit.visit_reason_id }}</td>
      <td>{{ visit.start_date | date:'EEEE, MMMM d, y h:mm a'}}</td>
      <td>{{ visit.end_date | date:'EEEE, MMMM d, y h:mm a'}}</td>
      <td>{{ visit.created_at | date:'EEEE, MMMM d, y h:mm a' }}</td>
      <td>{{ visit.client_id }}</td>
    </tr>
  </tbody>
</table>


</div>
