<div class="container mt-4">
  <!-- Header Row -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <app-back-button></app-back-button>
    <h3 class="title mb-0">Add Expense</h3>
    <div style="width: 40px"></div>
    <!-- spacer for center alignment -->
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form [formGroup]="expenseForm">
      <!-- GRID START -->
      <div class="row g-3">
        <!-- Category -->
        <div class="col-md-6">
          <label class="form-label"
            >Category <span class="required">*</span></label
          >
          <select
            class="form-select"
            formControlName="selectedCategory"
            name="category"
            placeholder="Category"
          >
            <option value="" disabled>Select Category</option>
            <option *ngFor="let c of categories" [value]="c.name">
              {{ c.name }}
            </option>
          </select>
        </div>

        <!-------------------------------------------------------- Visit ------------------------------------------------------------>
        <div class="col-md-6">
          <label class="form-label">
            Visit <span class="required">*</span>
          </label>

          <div class="position-relative visit-dropdown">
            <!-- SEARCH INPUT -->
            <input
              type="text"
              class="form-control"
              placeholder="Search Visit..."
              [(ngModel)]="visitSearch"
              [ngModelOptions]="{ standalone: true }"
              (focus)="isVisitDropdownOpen = true"
              (input)="onVisitSearchChange()"
              autocomplete="off"
            />

            <!-- DROPDOWN -->
            <div
              class="dropdown-menu show w-100 mt-1 p-1"
              *ngIf="isVisitDropdownOpen"
              style="max-height: 220px; overflow-y: auto"
            >
              <!-- OPTIONS -->
              <div
                class="dropdown-item"
                *ngFor="let v of filteredVisits"
                (click)="selectVisit(v)"
                style="cursor: pointer"
              >
                {{ v.visit_name }}
              </div>

              <!-- EMPTY STATE -->
              <div
                *ngIf="filteredVisits.length === 0"
                class="text-muted small px-2 py-1"
              >
                No visits found
              </div>
            </div>
          </div>
        </div>

        <!----------------------------------------------------------------- Date ----------------------------------------------------->
        <div class="col-md-6">
          <label class="form-label">Date <span class="required">*</span></label>
          <input
            type="date"
            class="form-control"
            formControlName="date"
            name="date"
            [min]="startDate"
            [max]="endDate"
          />
        </div>

        <!-- Amount -->
        <div class="col-md-6">
          <label class="form-label">
            Amount <span class="required">*</span>
          </label>

          <div class="input-group">
            <span class="input-group-text">₹</span>
            <input
              type="number"
              class="form-control"
              formControlName="amount"
              min="0"
              (keydown)="blockInvalidKeys($event)"
            />
          </div>
        </div>

        <!-- Receipt -->
        <div class="col-md-6">
          <label class="form-label"
            >Receipt No <span class="required">*</span></label
          >
          <input
            type="text"
            class="form-control"
            formControlName="receiptNo"
            name="receiptNo"
          />
        </div>

        <!-- Description -->
        <div class="col-md-6">
          <label class="form-label">Description</label>
          <input
            type="text"
            class="form-control"
            formControlName="description"
            name="description"
          />
        </div>

        <!-- FILE (FULL WIDTH) -->
        <div class="col-12">
          <label class="form-label"
            >Upload Bill <span class="required">*</span></label
          >

          <div class="file-box">
            <input
              type="file"
              #fileInput
              (change)="fileOnChange($event)"
              accept="image/*"
              class="form-control"
            />

            <!-- Preview -->
            <div *ngIf="filePreview" class="preview">
              <img [src]="filePreview" />
              <p class="file-name">
                {{ expenseForm.get("selectedFile")?.value?.name }}
              </p>
            </div>
          </div>
        </div>
      </div>
      <!-- GRID END -->

      <!-- BUTTONS -->
      <div class="mt-4 d-flex gap-2">
        <button
          type="button"
          class="btn btn-primary w-100"
          (click)="onSubmit()"
          [disabled]="loading"
        >
          {{ loading ? "Saving..." : "Save" }}
        </button>

        <button type="button" class="btn btn-light w-100" (click)="onClear()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
