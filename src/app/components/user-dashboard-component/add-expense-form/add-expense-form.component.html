<div class="row">
  <div class="container">
    <div class="col-4 offset-4">
      <h3 class="title text-center">Add Expense Form</h3>

      <form>
          <div>
            <label for="bill">Upload Bill:</label>
            <input type="file" (change)="fileOnChange($event)" name="bill" class="form-control"/>
          </div>

          <button class="form-control mt-3" type="button" (click)="onSubmit()">Submit</button>
      </form>
    </div>

  </div>
</div>
