<div class="header sticky-top d-flex justify-content-between align-items-center px-3 px-md-4 py-2">

  <!-- LEFT -->
  <div class="d-flex align-items-center gap-2 brand flex-shrink-1">
    <img src="Logo.png" alt="Logo" class="logo" />
    <span class="fw-semibold brand-text">
      Samprama Expense Tracker
    </span>
  </div>

  <!-- RIGHT -->
  <div class="d-flex align-items-center gap-2 gap-md-3">

    <!-- ROLE -->
    <span
      class="role-badge"
      [ngClass]="{
        admin: userRole === 'Admin',
        employee: userRole === 'employee'
      }"
    >
      {{ userRole }}
    </span>

    <!-- DIVIDER (subtle separation) -->
    <div class="vr d-none d-md-block opacity-25"></div>

    <!-- PROFILE -->
    <div
      class="profile d-flex align-items-center gap-2"
      (click)="goToProfile()"
    >
      <div class="avatar">
        {{ userInitial }}
      </div>

      <!-- Desktop only -->
      <span class="fw-medium user-name d-none d-md-inline">
        {{ userName }}
      </span>
    </div>

    <!-- LOGOUT -->
    <button
      class="btn btn-light logout-btn d-flex align-items-center gap-1 gap-md-2"
      (click)="logout()"
    >
      <i class="bi bi-box-arrow-right"></i>
      <span class="logout-text">Logout</span>
    </button>

  </div>

</div>
